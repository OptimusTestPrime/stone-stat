<!DOCTYPE html>

<html lang="en" style="background:#0d1b2a !important;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HammerTime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1b2a; --surface:#1a2e42; --surface2:#243b55;
  --accent:#3a9bd5; --accentL:#5bb8f5;
  --red:#c0392b; --ice:#e8f4f8; --muted:#8aabb8;
  --border:rgba(255,255,255,0.15);
}
html{background:#0d1b2a !important;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:#0d1b2a !important;color:#e8f4f8;min-height:100vh;-webkit-font-smoothing:antialiased;padding:16px 16px 60px;}
.app{max-width:480px;margin:0 auto;}
header{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:18px;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:10px;}
.app-title{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:radial-gradient(circle at 35% 35%,#e8f4f8,#8aabb8);border-radius:50%;border:2px solid #3a9bd5;box-shadow:0 0 12px rgba(58,155,213,0.4);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:20px;}
.title-hammer{display:none;}
.title-main{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-weight:900;font-size:26px;letter-spacing:2px;text-transform:uppercase;line-height:1;color:#e8f4f8;}
.title-time{color:#5bb8f5;}
.logo-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#5bb8f5;display:block;margin-top:2px;}
.view-toggle{display:-webkit-flex;display:flex;background:#243b55;border:1px solid rgba(255,255,255,0.15);border-radius:6px;overflow:hidden;}
.view-toggle button{background:transparent;border:none;color:#8aabb8;padding:7px 13px;cursor:pointer;font-size:1rem;-webkit-transition:all 0.2s;transition:all 0.2s;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-tap-highlight-color:transparent;}
.view-toggle button.active{background:#3a9bd5;color:#fff;}
.timing-selector{display:-webkit-flex;display:flex;gap:8px;margin-bottom:16px;}
.timing-btn{-webkit-flex:1;flex:1;background:#243b55;border:1px solid rgba(255,255,255,0.12);border-radius:4px;color:#8aabb8;padding:10px 4px;cursor:pointer;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;-webkit-transition:all 0.15s;transition:all 0.15s;line-height:1.3;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-appearance:none;appearance:none;}
.timing-btn.active{background:#3a9bd5;border-color:#3a9bd5;color:#fff;}
.display-area{margin-bottom:20px;}
#digital-view{background:#1a2e42;border:1px solid rgba(255,255,255,0.15);border-top:2px solid #3a9bd5;border-radius:10px;padding:28px 16px;text-align:center;}
.time-display{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:clamp(2.8rem,11vw,5rem);font-weight:900;white-space:nowrap;overflow:hidden;width:100%;text-align:center;color:#e8f4f8;letter-spacing:0.02em;line-height:1;-webkit-transition:color 0.1s;transition:color 0.1s;}
.time-display.running{color:#5bb8f5;}
.time-label{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:11px;letter-spacing:3px;color:#8aabb8;text-transform:uppercase;margin-top:8px;}
#analog-view{display:none;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;background:#1a2e42;border:1px solid rgba(255,255,255,0.15);border-top:2px solid #3a9bd5;border-radius:10px;padding:24px 16px;}
#analog-view.visible{display:-webkit-flex;display:flex;}
#digital-view.hidden{display:none;}
.watch-container{position:relative;width:min(280px,70vw);height:min(280px,70vw);margin:0 auto;}
#watch-canvas{width:100%;height:100%;border-radius:50%;}
.analog-digital{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:1.6rem;font-weight:700;color:#8aabb8;text-align:center;margin-top:14px;letter-spacing:0.08em;}
.controls{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;gap:20px;margin-bottom:24px;}
.btn-start{width:130px;height:130px;border-radius:50%;background:#3a9bd5;border:none;color:#fff;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;-webkit-transition:opacity 0.15s;transition:opacity 0.15s;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-flex-direction:column;flex-direction:column;gap:2px;position:relative;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-appearance:none;appearance:none;}
.btn-start:active{opacity:0.7;}
.btn-start.running{background:#c0392b;}
.btn-start-icon{font-size:1.8rem;line-height:1;}
.pulse-ring{display:none;}
.side-buttons{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:12px;}
.btn-reset{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:50%;width:56px;height:56px;color:#8aabb8;cursor:pointer;-webkit-transition:opacity 0.15s;transition:opacity 0.15s;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-tap-highlight-color:transparent;-webkit-appearance:none;appearance:none;}
.btn-reset:active{opacity:0.7;}
.history-section{}
.history-block{background:#1a2e42;border:1px solid rgba(255,255,255,0.12);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.history-header{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);background:#243b55;}
.history-title{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8aabb8;}
.history-title .hl{color:#5bb8f5;}
.btn-clear{background:transparent;color:#8aabb8;border:1px solid rgba(255,255,255,0.2);border-radius:4px;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;-webkit-appearance:none;appearance:none;}
.btn-clear:active{opacity:0.7;}
.history-list{padding:4px 0;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.history-item{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;padding:9px 16px;gap:10px;border-bottom:1px solid rgba(255,255,255,0.04);animation:fadeIn 0.25s ease;}
.history-item:last-child{border-bottom:none;}
.history-num{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:12px;font-weight:700;color:#8aabb8;width:18px;text-align:right;-webkit-flex-shrink:0;flex-shrink:0;}
.history-time{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:1.2rem;font-weight:700;color:#e8f4f8;-webkit-flex-shrink:0;flex-shrink:0;letter-spacing:1px;}
.history-item:first-child .history-time{color:#5bb8f5;}
.history-spacer{-webkit-flex:1;flex:1;}
.history-bar{display:none;}
.history-location{background:#243b55;border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#8aabb8;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;padding:6px 8px;cursor:pointer;width:152px;-webkit-flex-shrink:0;flex-shrink:0;-webkit-appearance:none;appearance:none;text-transform:uppercase;}
.history-location.set{border-color:#3a9bd5;color:#5bb8f5;background:rgba(58,155,213,0.12);}
.history-empty{padding:20px;text-align:center;color:#8aabb8;font-size:13px;letter-spacing:1px;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;text-transform:uppercase;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="app-title">
    <div class="logo-icon">🥌</div>
    <div>
      <div class="title-main">Hammer<span class="title-time">Time</span></div>
      <span class="logo-sub">Curling Delivery Timer</span>
    </div>
  </div>
  <div class="view-toggle">
    <button id="btn-digital" class="active" onclick="setView('digital')" title="Digital">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="7" width="18" height="10" rx="2"/>
        <line x1="7" y1="11" x2="7" y2="13"/><line x1="10" y1="10" x2="10" y2="14"/>
        <line x1="13" y1="11" x2="13" y2="13"/><line x1="16" y1="10" x2="16" y2="14"/>
      </svg>
    </button>
    <button id="btn-analog" onclick="setView('analog')" title="Analog">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="7" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="15" y2="14"/>
      </svg>
    </button>
  </div>
</header>

<!-- Timing Option -->

<div class="timing-selector">
  <button class="timing-btn active" id="opt-0" onclick="selectOption(0)">Back Line<br>to Hog Line</button>
  <button class="timing-btn" id="opt-1" onclick="selectOption(1)">T-Line<br>to Hog Line</button>
  <button class="timing-btn" id="opt-2" onclick="selectOption(2)">Hog Line<br>to Hog Line</button>
</div>

<!-- Display -->

<div class="display-area">
  <div id="digital-view">
    <div class="time-display" id="time-display">00:00.00</div>
    <div class="time-label" id="time-label">Back Line to Hog Line</div>
  </div>
  <div id="analog-view">
    <div class="watch-container">
      <canvas id="watch-canvas"></canvas>
    </div>
    <div class="analog-digital" id="analog-digital">00:00.00</div>
    <div class="time-label" id="analog-label" style="margin-top:4px">Back Line to Hog Line</div>
  </div>
</div>

<!-- Controls -->

<div class="controls">
  <div class="side-buttons">
    <button class="btn-reset" onclick="resetTimer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>

  <button class="btn-start" id="btn-start" onclick="toggleTimer()">
    <div class="pulse-ring"></div>
    <div class="btn-start-icon" id="start-icon">▶</div>
    <div id="start-label">START</div>
  </button>

  <div class="side-buttons" style="opacity:0; pointer-events:none;">
    <button class="btn-reset"></button>
  </div>
</div>

<!-- History -->

<div class="history-section">
  <div class="history-block" id="history-0">
    <div class="history-header">
      <span class="history-title"><span class="hl">B→H</span> &nbsp;Back Line to Hog Line</span>
      <button class="btn-clear" onclick="clearHistory(0)">Clear</button>
    </div>
    <div class="history-list" id="list-0"><div class="history-empty">No times recorded</div></div>
  </div>
  <div class="history-block" id="history-1">
    <div class="history-header">
      <span class="history-title"><span class="hl">T→H</span> &nbsp;T-Line to Hog Line</span>
      <button class="btn-clear" onclick="clearHistory(1)">Clear</button>
    </div>
    <div class="history-list" id="list-1"><div class="history-empty">No times recorded</div></div>
  </div>
  <div class="history-block" id="history-2">
    <div class="history-header">
      <span class="history-title"><span class="hl">H→H</span> &nbsp;Hog Line to Hog Line</span>
      <button class="btn-clear" onclick="clearHistory(2)">Clear</button>
    </div>
    <div class="history-list" id="list-2"><div class="history-empty">No times recorded</div></div>
  </div>
</div>

<script>
  const OPTIONS = ['Back Line to Hog Line', 'T-Line to Hog Line', 'Hog Line to Hog Line'];
  let currentOption = 0;
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let rafId = null;
  let currentView = 'digital';

  // Load history
  let history = [
    JSON.parse(localStorage.getItem('curling_history_0') || '[]'),
    JSON.parse(localStorage.getItem('curling_history_1') || '[]'),
    JSON.parse(localStorage.getItem('curling_history_2') || '[]')
  ];

  function pad(n, d) { return String(Math.floor(n)).padStart(d, '0'); }

  function formatTime(ms) {
    const mins = Math.floor(ms / 60000);
    const secs = Math.floor((ms % 60000) / 1000);
    const hundredths = Math.floor((ms % 1000) / 10);
    return `${pad(mins,2)}:${pad(secs,2)}.${pad(hundredths,2)}`;
  }

  function updateDisplay(ms) {
    const t = formatTime(ms);
    document.getElementById('time-display').textContent = t;
    document.getElementById('analog-digital').textContent = t;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    updateDisplay(elapsed);
    drawAnalog(elapsed);
    rafId = requestAnimationFrame(tick);
  }

  function toggleTimer() {
    if (!running) {
      startTime = Date.now() - elapsed;
      running = true;
      rafId = requestAnimationFrame(tick);
      document.getElementById('btn-start').classList.add('running');
      document.getElementById('start-icon').textContent = '⏹';
      document.getElementById('start-label').textContent = 'STOP';
      document.getElementById('time-display').classList.add('running');
    } else {
      cancelAnimationFrame(rafId);
      running = false;
      document.getElementById('btn-start').classList.remove('running');
      document.getElementById('start-icon').textContent = '▶';
      document.getElementById('start-label').textContent = 'START';
      document.getElementById('time-display').classList.remove('running');
      logTime(elapsed);
    }
  }

  function resetTimer() {
    if (running) {
      cancelAnimationFrame(rafId);
      running = false;
      document.getElementById('btn-start').classList.remove('running');
      document.getElementById('start-icon').textContent = '▶';
      document.getElementById('start-label').textContent = 'START';
      document.getElementById('time-display').classList.remove('running');
    }
    elapsed = 0;
    updateDisplay(0);
    drawAnalog(0);
  }

  const LOCATIONS = [
    '— Select Location —',
    'High Guard',
    'Mid Guard',
    'Tight Guard',
    'Top 12',
    'Top 8',
    'Front 4',
    'Button',
    'Back 4',
    'Back 8',
    'Back 12',
    'Hack',
    'Parking Lot'
  ];

  function logTime(ms) {
    if (ms < 100) return; // ignore accidental taps
    const entry = { time: formatTime(ms), location: '' };
    history[currentOption].unshift(entry);
    if (history[currentOption].length > 10) history[currentOption].pop();
    localStorage.setItem('curling_history_' + currentOption, JSON.stringify(history[currentOption]));
    renderHistory(currentOption);
  }

  function updateLocation(optIdx, entryIdx, value) {
    history[optIdx][entryIdx].location = value;
    localStorage.setItem('curling_history_' + optIdx, JSON.stringify(history[optIdx]));
    // Update dropdown class
    const sel = document.querySelector(`#list-${optIdx} .history-item:nth-child(${entryIdx+1}) .history-location`);
    if (sel) sel.className = 'history-location' + (value ? ' set' : '');
  }

  function clearHistory(idx) {
    history[idx] = [];
    localStorage.removeItem('curling_history_' + idx);
    renderHistory(idx);
  }

  function renderHistory(idx) {
    const list = document.getElementById('list-' + idx);
    if (!history[idx].length) {
      list.innerHTML = '<div class="history-empty">No times recorded</div>';
      return;
    }
    list.innerHTML = history[idx].map((entry, i) => {
      // support legacy string entries
      const timeStr = typeof entry === 'string' ? entry : entry.time;
      const loc = typeof entry === 'string' ? '' : (entry.location || '');
      const options = LOCATIONS.map(l =>
        `<option value="${l === LOCATIONS[0] ? '' : l}" ${loc === (l === LOCATIONS[0] ? '' : l) ? 'selected' : ''}>${l}</option>`
      ).join('');
      return `<div class="history-item">
        <span class="history-num">${i+1}</span>
        <span class="history-time">${timeStr}</span>
        <span class="history-spacer"></span>
        <select class="history-location${loc ? ' set' : ''}" onchange="updateLocation(${idx},${i},this.value)">${options}</select>
      </div>`;
    }).join('');
  }

  function timeToMs(entry) {
    const str = typeof entry === 'string' ? entry : entry.time;
    const [minsec, hun] = str.split('.');
    const [min, sec] = minsec.split(':');
    return (+min)*60000 + (+sec)*1000 + (+hun)*10;
  }

  function selectOption(idx) {
    currentOption = idx;
    document.getElementById('opt-0').classList.toggle('active', idx === 0);
    document.getElementById('opt-1').classList.toggle('active', idx === 1);
    document.getElementById('opt-2').classList.toggle('active', idx === 2);
    document.getElementById('time-label').textContent = OPTIONS[idx];
    document.getElementById('analog-label').textContent = OPTIONS[idx];
  }

  function setView(v) {
    currentView = v;
    document.getElementById('digital-view').classList.toggle('hidden', v !== 'digital');
    document.getElementById('analog-view').classList.toggle('visible', v === 'analog');
    document.getElementById('btn-digital').classList.toggle('active', v === 'digital');
    document.getElementById('btn-analog').classList.toggle('active', v === 'analog');
    if (v === 'analog') { resizeCanvas(); drawAnalog(elapsed); }
  }

  // ---------- Analog Watch ----------
  const canvas = document.getElementById('watch-canvas');
  const ctx = canvas.getContext('2d');
  let canvasSize = 280;

  function resizeCanvas() {
    const container = canvas.parentElement;
    canvasSize = container.offsetWidth;
    canvas.width = canvasSize * devicePixelRatio;
    canvas.height = canvasSize * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }

  function drawAnalog(ms) {
    if (currentView !== 'analog') return;
    const S = canvasSize;
    const cx = S / 2, cy = S / 2;
    const R = S / 2 - 6;
    ctx.clearRect(0, 0, S, S);

    // Face background
    const grad = ctx.createRadialGradient(cx, cy-R*0.2, 0, cx, cy, R);
    grad.addColorStop(0, '#1e3a55');
    grad.addColorStop(1, '#0d1b2a');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Accent ring
    ctx.beginPath();
    ctx.arc(cx, cy, R - 5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(58,155,213,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Tick marks
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * Math.PI * 2 - Math.PI/2;
      const major = i % 5 === 0;
      const len = major ? 10 : 5;
      const thick = major ? 2 : 1;
      const rOuter = R - 10;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * rOuter, cy + Math.sin(a) * rOuter);
      ctx.lineTo(cx + Math.cos(a) * (rOuter - len), cy + Math.sin(a) * (rOuter - len));
      ctx.strokeStyle = major ? 'rgba(58,155,213,0.8)' : 'rgba(138,171,184,0.4)';
      ctx.lineWidth = thick;
      ctx.stroke();
    }

    // Second numbers (0, 10, 20, 30, 40, 50)
    ctx.font = `bold ${S*0.055}px -apple-system, 'SF Pro Display', sans-serif`;
    ctx.fillStyle = 'rgba(138,171,184,0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI/2;
      const r = R - 28;
      ctx.fillText(String(i*10), cx + Math.cos(a)*r, cy + Math.sin(a)*r);
    }

    // Minutes sub-dial (top area)
    const subR = R * 0.22;
    const subX = cx, subY = cy - R * 0.38;
    ctx.beginPath();
    ctx.arc(subX, subY, subR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(58,155,213,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Sub-dial ticks
    for (let i = 0; i < 30; i++) {
      const a = (i/30)*Math.PI*2 - Math.PI/2;
      const major = i % 5 === 0;
      ctx.beginPath();
      ctx.moveTo(subX + Math.cos(a)*(subR-1), subY + Math.sin(a)*(subR-1));
      ctx.lineTo(subX + Math.cos(a)*(subR - (major ? 5 : 2.5)), subY + Math.sin(a)*(subR - (major ? 5 : 2.5)));
      ctx.strokeStyle = major ? 'rgba(0,200,255,0.5)' : 'rgba(74,112,144,0.35)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    const totalSecs = ms / 1000;
    const totalMins = ms / 60000;

    // Minutes hand (sub-dial)
    const minAngle = (totalMins % 30 / 30) * Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(subX, subY);
    ctx.lineTo(subX + Math.cos(minAngle)*(subR-6), subY + Math.sin(minAngle)*(subR-6));
    ctx.strokeStyle = '#3a9bd5';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Progress arc
    const secsAngle = (totalSecs % 60 / 60) * Math.PI * 2;
    if (secsAngle > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, R - 10, -Math.PI/2, -Math.PI/2 + secsAngle);
      ctx.strokeStyle = running ? 'rgba(91,184,245,0.3)' : 'rgba(58,155,213,0.2)';
      ctx.lineWidth = 8;
      ctx.stroke();
    }

    // Second hand
    const secAngle = (totalSecs % 60 / 60) * Math.PI * 2 - Math.PI/2;
    const secColor = running ? '#5bb8f5' : '#3a9bd5';

    // Tail
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(secAngle + Math.PI) * R*0.2, cy + Math.sin(secAngle + Math.PI) * R*0.2);
    ctx.strokeStyle = secColor;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Main hand
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(secAngle) * (R - 18), cy + Math.sin(secAngle) * (R - 18));
    ctx.strokeStyle = secColor;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Glow tip
    ctx.beginPath();
    ctx.arc(cx + Math.cos(secAngle)*(R-18), cy + Math.sin(secAngle)*(R-18), 3, 0, Math.PI*2);
    ctx.fillStyle = secColor;
    ctx.fill();

    // Center cap
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI*2);
    ctx.fillStyle = secColor;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#080e1a';
    ctx.fill();
  }

  // Init
  window.addEventListener('resize', () => { if (currentView === 'analog') { resizeCanvas(); drawAnalog(elapsed); } });
  resizeCanvas();
  renderHistory(0);
  renderHistory(1);
  renderHistory(2);
  drawAnalog(0);
</script>

</div>
</body>
</html>
